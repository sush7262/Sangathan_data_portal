<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sangathan Data Portal — सोलन विभाग</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Mukta:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBF7EF;--paper2:#F4EEE0;--card:#FFFDF8;--ink:#1B2436;--ink2:#5A6473;--ink3:#8A93A1;
  --line:#E5DCC8;--line2:#EFE8D8;--saffron:#D9661C;--saffron-d:#B9530F;--saffron-soft:#FBEAD8;
  --green:#2E6B4F;--green-soft:#E6F0EA;--amber:#B5791A;--amber-soft:#F8EFD8;--red:#9A3324;--red-soft:#F6E4DF;
  --blue:#2B5C8A;--blue-soft:#E4EDF4;--shadow:0 1px 2px rgba(27,36,54,.05),0 8px 28px rgba(27,36,54,.07);
}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:'Mukta',system-ui,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
.num{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums}
.dev{font-family:'Tiro Devanagari Hindi',serif}
button{font-family:inherit}
.btn{cursor:pointer;border-radius:11px;padding:11px 18px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:600;font-size:14.5px;transition:.14s}
.btn:hover{border-color:#D8C8A6}
.btn.primary{background:var(--saffron);border-color:var(--saffron);color:#fff;box-shadow:0 6px 16px rgba(217,102,28,.26)}
.btn.primary:hover{background:var(--saffron-d)}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.btn.green{background:var(--green);border-color:var(--green);color:#fff}
.btn:disabled{opacity:.55;cursor:not-allowed}
input,select{font-family:inherit}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px}
.pill.sub{background:var(--green-soft);color:var(--green)}
.pill.draft{background:var(--amber-soft);color:var(--amber)}
.pill.pend{background:var(--paper2);color:var(--ink2)}
.pill.adm{background:var(--blue-soft);color:var(--blue)}
.pill.usr{background:var(--saffron-soft);color:var(--saffron-d)}

/* top bar */
.topbar{display:flex;align-items:center;gap:14px;background:var(--ink);color:#F3EEE2;padding:12px 20px;border-bottom:3px solid var(--saffron)}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--saffron),#E89A4E);display:grid;place-items:center;font-family:'Tiro Devanagari Hindi';font-size:21px;color:#fff;flex:none}
.brand .t1{font-family:'Tiro Devanagari Hindi';font-size:18px;line-height:1}
.brand .t2{font-size:11px;color:#A9B2C0;font-family:'IBM Plex Mono';letter-spacing:.06em}
.spacer{flex:1}
.userchip{display:flex;align-items:center;gap:9px;background:#26304a;border:1px solid #36415e;border-radius:11px;padding:6px 11px;font-size:13px}
.userchip .em{color:#D9DEE7;font-family:'IBM Plex Mono';font-size:12px}

/* layout */
.shell{display:flex;min-height:calc(100vh - 67px)}
.side{width:230px;flex:none;background:#fff;border-right:1px solid var(--line);padding:16px 12px}
.side .grp{font-family:'IBM Plex Mono';font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin:8px 10px}
.navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--ink);font-weight:600;font-size:14px;margin-bottom:2px}
.navitem:hover{background:var(--paper2)}
.navitem.on{background:var(--saffron-soft);color:var(--saffron-d)}
.navitem .ic{width:18px;text-align:center}
.content{flex:1;padding:26px 30px;max-width:1180px}
@media(max-width:840px){.side{display:none}.content{padding:20px 16px}}

.page-h{display:flex;align-items:flex-end;gap:12px;margin-bottom:4px}
.page-h h1{font-family:'Tiro Devanagari Hindi';font-weight:400;font-size:27px;margin:0}
.page-h .sub{color:var(--ink2);font-size:14px;margin-bottom:20px}

/* stepper (non-admin) */
.stepper{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px}
.step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 13px}
.step .n{font-family:'IBM Plex Mono';font-weight:600;font-size:11px;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:var(--paper2);color:var(--ink2)}
.step.on{border-color:var(--saffron);color:var(--saffron-d);background:#fff;box-shadow:0 0 0 1px var(--saffron)}
.step.on .n{background:var(--saffron);color:#fff}
.step.done .n{background:var(--green);color:#fff}

/* cards & grids */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.card.pad{padding:20px 22px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.tile .k{font-size:12.5px;color:var(--ink2)}
.tile .v{font-family:'IBM Plex Mono';font-weight:600;font-size:30px;margin-top:2px}
.tile .x{font-size:12px;color:var(--ink3)}
.tile.acc{border-top:3px solid var(--saffron)}

table.tbl{width:100%;border-collapse:collapse;font-size:14px}
table.tbl th{text-align:left;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink3);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
table.tbl td{padding:11px 12px;border-bottom:1px solid var(--line2)}
table.tbl tr:last-child td{border-bottom:0}
table.tbl tr:hover td{background:var(--paper2)}

/* district cards */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
.dcard .dh{display:flex;align-items:center;gap:10px}
.dcard .dh .nm{font-family:'Tiro Devanagari Hindi';font-size:21px;flex:1}
.ring{--p:0;width:54px;height:54px;border-radius:50%;flex:none;
  background:radial-gradient(closest-side,#fff 71%,transparent 72%),conic-gradient(var(--saffron) calc(var(--p)*1%),var(--line2) 0);
  display:grid;place-items:center}
.ring span{font-family:'IBM Plex Mono';font-size:12px;font-weight:600;color:var(--ink)}

/* forms */
.group{padding:16px 0;border-top:1px dashed var(--line)}
.group:first-child{border-top:0}
.eyebrow{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--saffron-d);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--saffron)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px 13px}
.fld label{display:block;font-size:12.5px;color:var(--ink2);margin-bottom:4px;line-height:1.25;min-height:2.1em}
.fld input{width:100%;font-family:'IBM Plex Mono';font-size:15px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 10px;outline:none;text-align:right;transition:.12s}
.fld input:hover{border-color:#D8C8A6}
.fld input:focus{border-color:var(--saffron);background:#fff;box-shadow:0 0 0 3px var(--saffron-soft)}
.fld input.filled{background:#fff;border-color:#D6C9A8}
.fld input:disabled{background:var(--green-soft);color:var(--green);border-color:#CBE2D5;font-weight:600}
.autobox{background:var(--green-soft);border:1px solid #CBE2D5;border-radius:12px;padding:14px 16px;margin-top:14px}
.autobox .ttl{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
.autobox .row{display:flex;flex-wrap:wrap;gap:8px 18px}
.autobox .ai{font-size:13px;color:#2c5a44}
.autobox .ai b{font-family:'IBM Plex Mono';font-size:15px;color:var(--green);margin-left:6px}
.formbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.formbar .sp{flex:1}

/* login */
.loginwrap{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:radial-gradient(1200px 500px at 50% -10%,#26304a,#1B2436)}
.loginbox{width:100%;max-width:430px;background:var(--card);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden}
.loginbox .lh{background:var(--ink);color:#F3EEE2;padding:22px 26px;border-bottom:3px solid var(--saffron)}
.loginbox .lh .t1{font-family:'Tiro Devanagari Hindi';font-size:22px}
.loginbox .lh .t2{font-size:12px;color:#A9B2C0;font-family:'IBM Plex Mono';letter-spacing:.06em}
.loginbox .lb{padding:24px 26px}
.field{margin-bottom:14px}
.field>span{display:block;font-size:12.5px;color:var(--ink2);margin-bottom:6px}
.field input,.field select{width:100%;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--paper);outline:none}
.field input:focus,.field select:focus{border-color:var(--saffron);box-shadow:0 0 0 3px var(--saffron-soft)}
.demo{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line)}
.demo .dl{font-size:11.5px;color:var(--ink3);margin-bottom:8px;font-family:'IBM Plex Mono';letter-spacing:.04em}
.demo .chips{display:flex;gap:8px;flex-wrap:wrap}
.demo .chips button{font-size:12px;padding:6px 11px;border:1px solid var(--line);background:#fff;border-radius:999px;cursor:pointer}
.demo .chips button:hover{border-color:var(--saffron);color:var(--saffron-d)}
.note{font-size:12px;color:var(--ink2);background:var(--blue-soft);border:1px solid #cfe0ee;border-radius:10px;padding:9px 12px}
.errline{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}

/* checklist */
.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line2);font-size:14px}
.check:last-child{border-bottom:0}
.ck{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;flex:none;color:#fff}
.ck.ok{background:var(--green)}.ck.warn{background:var(--amber)}.ck.no{background:var(--ink3)}

/* ack */
.ackcard{max-width:560px;margin:0 auto;text-align:center;padding:34px 30px}
.ackmark{width:74px;height:74px;border-radius:50%;background:var(--green-soft);border:2px solid var(--green);display:grid;place-items:center;margin:0 auto 16px;color:var(--green);font-size:34px}
.kv{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line2);font-size:14px}
.kv .k{color:var(--ink2)}.kv .v{font-weight:600}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#F3EEE2;padding:11px 18px;border-radius:11px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shadow);z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#7a2618}.toast.ok{background:#1f4a37}

.bar{height:7px;border-radius:999px;background:var(--line2);overflow:hidden}
.bar>i{display:block;height:100%;background:var(--saffron)}
.bar.g>i{background:var(--green)}
.muted{color:var(--ink2)}
.right{text-align:right}
.flex{display:flex;align-items:center;gap:10px}
.wrap-actions{display:flex;gap:8px;flex-wrap:wrap}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%;padding:24px}}
#printArea{display:none}
</style>
</head>

<script>
"use strict";
const DATA=JSON.parse(document.getElementById('appdata').textContent);
const SECTIONS=DATA.sections, DISTRICTS=DATA.districts, SHEET=DATA.sheet;
const DNAMES=DISTRICTS.map(d=>d.name);
const ALLCOLS=SECTIONS.flatMap(s=>s.cols);

/* ---- auto-total definitions (leaf cols summed) ---- */
const AUTO={
 I:['F','G','H'],
 AB:['Y','Z','AA'],AE:['AC','AD'],AF:['Y','Z','AA','AC','AD'],
 AJ:['AG','AH','AI'],AM:['AK','AL'],AN:['AG','AH','AI','AK','AL'],
 AO:['Y','Z','AA','AC','AD','AG','AH','AI','AK','AL'],
 AY:['AP','AS','AV'],AZ:['AQ','AT','AW'],BA:['AR','AU','AX'],
 BB:['AP','AQ','AR','AS','AT','AU','AV','AW','AX'],
 BG:['BD','BE','BF'],
 BK:['BH','BI','BJ'],BO:['BL','BM','BN'],BS:['BH','BI','BJ','BL','BM','BN'],
 BW:['BU','BV'],BZ:['BX','BY'],CC:['CA','CB'],CF:['BX','BY','CA','CB'],
 CR:['CM','CN','CO','CP','CQ'],CU:['CS','CT']
};
const AUTO_LABELS={I:'प्रशिक्षित शिक्षार्थी योग',AF:'ग्रामीण शाखा योग',AN:'नगरीय शाखा योग',AO:'समग्र शाखा योग',
 AY:'मिलन स्थान (समग्र)',BB:'मिलन संख्या (समग्र योग)',BG:'संघ मंडली योग',BS:'संगठन टोली समग्र योग',
 BW:'पालक युक्त शाखा योग',CF:'जागरण टोली समग्र योग',CR:'प्रचारक योग',CU:'विस्तारक योग'};
const SECTION_AUTOS={training:['I'],shakha:['AF','AN','AO'],milan:['AY','BB','BG'],
 toli:['BS','BW','CF'],pracharak:['CR','CU'],target:[]};

/* ---- persistence ---- */
const LS={get(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(_){return f}},
          set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(_){}}};
let ACCESS=LS.get('smk_access',[
 {email:'admin@example.org',role:'Admin',vibhag:'सोलन',districts:[...DNAMES],status:'Active'},
 {email:'entryuser@example.org',role:'Data Entry',vibhag:'सोलन',districts:[...DNAMES],status:'Active'},
 {email:'entry1@example.org',role:'Data Entry',vibhag:'सोलन',districts:['सोलन'],status:'Active'},
 {email:'entry2@example.org',role:'Data Entry',vibhag:'सोलन',districts:['नालागढ़'],status:'Active'},
]);
let ENTRIES=LS.get('smk_entries',{});
function entry(d){ if(!ENTRIES[d]) ENTRIES[d]={values:{},status:'pending',submittedBy:null,submittedAt:null}; return ENTRIES[d]; }
function saveAll(){ LS.set('smk_entries',ENTRIES); LS.set('smk_access',ACCESS); }

/* ---- state ---- */
let S={user:null,screen:'login',district:null,sectionIdx:0,ctx:'user'};

/* ---- helpers ---- */
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const numv=v=>{const n=parseFloat(v);return isFinite(n)?n:0;};
const val=(d,c)=>numv(entry(d).values[c]);
const auto=(d,c)=>(AUTO[c]||[]).reduce((s,x)=>s+val(d,x),0);
function sectionFilled(d,sec){return sec.cols.filter(c=>{const v=entry(d).values[c];return v!=null&&v!=='';}).length;}
function sectionPct(d,sec){return Math.round(100*sectionFilled(d,sec)/sec.cols.length);}
function districtFilled(d){return ALLCOLS.filter(c=>{const v=entry(d).values[c];return v!=null&&v!=='';}).length;}
function districtPct(d){return Math.round(100*districtFilled(d)/ALLCOLS.length);}
function dispStatus(d){const e=ENTRIES[d];if(e&&e.status==='submitted')return'submitted';if(districtFilled(d)>0)return'draft';return'pending';}
const STLABEL={submitted:'Submitted',draft:'Draft',pending:'Pending'};
const STCLASS={submitted:'sub',draft:'draft',pending:'pend'};

let tT;function toast(m,k){const t=$('#toast');t.textContent=m;t.className='toast show '+(k||'');clearTimeout(tT);tT=setTimeout(()=>t.className='toast',2600);}

/* ---- top chrome ---- */
function topbar(){
  const u=S.user;
  return `<div class="topbar">
    <div class="brand"><div class="logo dev">शि</div>
      <div><div class="t1">शिक्षा महाकुम्भ · संगठन डेटा पोर्टल</div>
      <div class="t2">SOLAN VIBHAG WORKBOOK</div></div></div>
    <div class="spacer"></div>
    ${u?`<span class="pill ${u.role==='Admin'?'adm':'usr'}">${u.role==='Admin'?'ADMIN':'DATA ENTRY USER'}</span>
      <div class="userchip"><span class="em">${esc(u.email)}</span></div>
      <button class="btn sm ghost" style="color:#E7CBA6;border-color:#3a4566" onclick="logout()">लॉगआउट</button>`:''}
  </div>`;
}
function logout(){S={user:null,screen:'login',district:null,sectionIdx:0,ctx:'user'};render();}

/* ================= LOGIN ================= */
function loginScreen(){
  $('#app').innerHTML=`<div class="loginwrap"><div class="loginbox">
    <div class="lh"><div class="t1">संगठन डेटा पोर्टल</div><div class="t2">portal.shikshamahakumbh.org · Login</div></div>
    <div class="lb">
      <div class="field"><span>Email ID</span><input id="email" type="email" placeholder="approved.mail@example.org" autocomplete="off"></div>
      <button class="btn primary" style="width:100%" onclick="doLogin()">Send OTP / Continue</button>
      <div class="errline" id="lerr"></div>
      <div class="note" style="margin-top:6px">सिस्टम Access Master में मेल आईडी जाँचता है और भूमिका अनुसार रूट करता है — Admin → Dashboard, अन्य → Data Entry।</div>
      <div class="demo"><div class="dl">DEMO LOGINS — टैप करें</div>
        <div class="chips">
          <button onclick="quick('admin@example.org')">admin (Dashboard)</button>
          <button onclick="quick('entryuser@example.org')">entryuser (सभी जिले)</button>
          <button onclick="quick('entry1@example.org')">entry1 (सोलन)</button>
        </div></div>
    </div></div></div>`;
  const ip=$('#email'); ip.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}
function quick(e){$('#email').value=e;doLogin();}
function doLogin(){
  const email=($('#email').value||'').trim().toLowerCase();
  const rec=ACCESS.find(a=>a.email.toLowerCase()===email&&a.status==='Active');
  if(!email){$('#lerr').textContent='Email ID दर्ज करें।';return;}
  if(!rec){$('#lerr').textContent='यह मेल आईडी Access Master में स्वीकृत नहीं है।';return;}
  S.user={email:rec.email,role:rec.role,vibhag:rec.vibhag,districts:rec.districts};
  S.screen = rec.role==='Admin' ? 'ad_dashboard' : 'na_landing';
  S.ctx = rec.role==='Admin' ? 'admin':'user';
  render();
}

/* ================= NON-ADMIN ================= */
function stepper(stage){ // stage: entry|review|submit
  const steps=[['1','Data Entry','entry'],['2','Review','review'],['3','Submit','submit']];
  const order=['entry','review','submit'];const cur=order.indexOf(stage);
  return `<div class="stepper">${steps.map(([n,l,k],i)=>
    `<div class="step ${k===stage?'on':(i<cur?'done':'')}"><span class="n">${i<cur?'✓':n}</span>${l}</div>`).join('')}</div>`;
}
function naLanding(){
  const u=S.user;
  const rows=u.districts.map(d=>{
    const st=dispStatus(d),pct=districtPct(d);
    return `<tr><td class="dev" style="font-size:17px">${d}</td>
      <td style="width:160px"><div class="bar"><i style="width:${pct}%"></i></div><div class="muted" style="font-size:12px;margin-top:3px">${pct}% भरा</div></td>
      <td><span class="pill ${STCLASS[st]}">${STLABEL[st]}</span></td>
      <td class="right"><button class="btn sm primary" onclick="openForm('${d}')">${st==='submitted'?'देखें':'फॉर्म खोलें'}</button></td></tr>`;
  }).join('');
  $('#app').innerHTML=topbar()+`<div class="content" style="margin:0 auto">
    ${stepper('entry')}
    <div class="page-h"><h1>Data Entry Portal</h1></div>
    <div class="sub">यह non-admin उपयोगकर्ता का एकमात्र होम स्क्रीन है — कोई dashboard, report या admin मेनू नहीं।</div>
    <div class="tiles">
      <div class="tile acc"><div class="k">Assigned Vibhag</div><div class="v dev" style="font-size:24px">${u.vibhag}</div><div class="x">मेल आईडी से मैप्ड</div></div>
      <div class="tile"><div class="k">Allowed Districts</div><div class="v">${u.districts.length}</div><div class="x">${u.districts.join(', ')}</div></div>
      <div class="tile"><div class="k">Submitted</div><div class="v num">${u.districts.filter(d=>dispStatus(d)==='submitted').length}</div><div class="x">of ${u.districts.length}</div></div>
    </div>
    <div class="card pad">
      <div class="eyebrow">Step 1–2 · Vibhag → District</div>
      <table class="tbl"><thead><tr><th>District</th><th>Draft completion</th><th>Status</th><th class="right">Action</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div></div>`;
}
function openForm(d){
  if(S.ctx==='user' && !S.user.districts.includes(d)){toast('यह जिला आपको आवंटित नहीं है',1);return;}
  S.district=d;S.sectionIdx=0;S.screen='na_form';render();
}
function naForm(){
  const d=S.district,sec=SECTIONS[S.sectionIdx],e=entry(d);
  const locked = e.status==='submitted' && S.ctx!=='admin';
  const groups=sec.groups.map(g=>{
    const fields=g.fields.map(f=>{
      const v=e.values[f.col]??'';
      return `<div class="fld"><label title="${esc(f.label)}">${esc(f.label)}</label>
        <input class="num ${v!==''?'filled':''}" inputmode="numeric" data-col="${f.col}" value="${esc(v)}" ${locked?'disabled':''}></div>`;
    }).join('');
    return `<div class="group"><div class="eyebrow">${esc(g.group)}</div><div class="fgrid">${fields}</div></div>`;
  }).join('');
  const autos=SECTION_AUTOS[sec.key]||[];
  const autoHtml=autos.length?`<div class="autobox"><div class="ttl">स्वतः योग · Auto totals</div><div class="row" id="autorow">
    ${autos.map(c=>`<span class="ai">${esc(AUTO_LABELS[c]||c)}<b data-auto="${c}">${auto(d,c)}</b></span>`).join('')}</div></div>`:'';
  const back=S.ctx==='admin';
  $('#app').innerHTML=topbar()+`<div class="content" style="margin:0 auto">
    ${back?`<button class="btn sm ghost" onclick="adminBack()">← Admin</button>`:stepper('entry')}
    <div class="page-h"><h1 class="dev">${esc(sec.title)}</h1></div>
    <div class="sub">जिला: <b class="dev">${d}</b> · विभाग: <b class="dev">${S.user.vibhag}</b> · Step ${S.sectionIdx+1} of ${SECTIONS.length}${locked?' · <span class="pill sub">Submitted — locked</span>':''}</div>

  const email=($('#acc_email').value||'').trim().toLowerCase();

/* ================= EXPORT ================= */
function b64ToBuf(b64){const bin=atob(b64),len=bin.length,buf=new Uint8Array(len);for(let i=0;i<len;i++)buf[i]=bin.charCodeAt(i);return buf.buffer;}
async function downloadExcel(dists,filename){
  try{
    toast('Excel बन रहा है…');
    const wb=new ExcelJS.Workbook();await wb.xlsx.load(b64ToBuf(DATA.b64));
    const ws=wb.getWorksheet(SHEET)||wb.worksheets[0];
    let written=0;
    dists.forEach(name=>{const d=DISTRICTS.find(x=>x.name===name);if(!d)return;const e=ENTRIES[name];if(!e)return;
      ALLCOLS.forEach(col=>{const raw=e.values[col];if(raw==null||raw==='')return;
        const n=Number(raw);ws.getCell(col+d.row).value=isFinite(n)?n:raw;written++;});});
    try{wb.calcProperties.fullCalcOnLoad=true;}catch(_){}
    const out=await wb.xlsx.writeBuffer();
    dl(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),filename);
    toast(`Excel तैयार — ${written} मान`,'ok');
  }catch(err){console.error(err);toast('Excel त्रुटि: '+err.message,1);}
}
function exportCSV(){
  let rows=[['District','Row','Section','FieldCode','Label','Value']];
  const labelOf={};SECTIONS.forEach(s=>s.groups.forEach(g=>g.fields.forEach(f=>labelOf[f.col]=f.label)));
  DISTRICTS.forEach(d=>{const e=ENTRIES[d.name];if(!e)return;
    SECTIONS.forEach(s=>s.cols.forEach(c=>{const v=e.values[c];if(v==null||v==='')return;
      rows.push([d.name,d.row,s.short,c,labelOf[c]||'',v]);}));});
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),'solan_vibhag_backup.csv');
  toast('CSV backup तैयार','ok');
}
function downloadAck(d){
  const e=entry(d);const ts=e.submittedAt?new Date(e.submittedAt).toLocaleString('en-IN'):'—';
  const html=`<!doctype html><meta charset="utf-8"><title>Acknowledgement</title>
  <body style="font-family:sans-serif;max-width:560px;margin:40px auto;color:#1B2436">
  <h2 style="border-bottom:3px solid #D9661C;padding-bottom:8px">संगठन डेटा पोर्टल — Acknowledgement</h2>
  <p>Submission Completed ✓</p>
  <table style="width:100%;border-collapse:collapse">
   <tr><td style="padding:6px;color:#5A6473">Vibhag</td><td style="padding:6px"><b>${S.user.vibhag}</b></td></tr>
   <tr><td style="padding:6px;color:#5A6473">District</td><td style="padding:6px"><b>${d}</b></td></tr>
   <tr><td style="padding:6px;color:#5A6473">Submitted by</td><td style="padding:6px">${esc(e.submittedBy||'')}</td></tr>
   <tr><td style="padding:6px;color:#5A6473">Time stamp</td><td style="padding:6px">${ts}</td></tr>
   <tr><td style="padding:6px;color:#5A6473">Fields filled</td><td style="padding:6px">${districtFilled(d)}/${ALLCOLS.length}</td></tr>
   <tr><td style="padding:6px;color:#5A6473">Status</td><td style="padding:6px"><b>Submitted</b></td></tr>
  </table></body>`;
  dl(new Blob([html],{type:'text/html'}),`acknowledgement_${d}.html`);
}
function printReport(kind){
  const title=kind==='vibhag'?'Vibhag Consolidated Report — सोलन':'District-wise Report — सोलन Vibhag';
  let body=`<h2 style="border-bottom:3px solid #D9661C;padding-bottom:8px;font-family:sans-serif">${title}</h2>
    <p style="font-family:sans-serif;color:#555">Generated ${new Date().toLocaleString('en-IN')} · structure mirrors uploaded Excel headings.</p>`;
  body+=`<table style="width:100%;border-collapse:collapse;font-family:sans-serif;font-size:13px">
    <thead><tr><th style="text-align:left;border-bottom:2px solid #333;padding:6px">District</th>
    ${SECTIONS.map(s=>`<th style="text-align:right;border-bottom:2px solid #333;padding:6px">${s.short}</th>`).join('')}
    <th style="text-align:right;border-bottom:2px solid #333;padding:6px">Status</th></tr></thead><tbody>
    ${DNAMES.map(d=>`<tr><td style="padding:6px;border-bottom:1px solid #ccc">${d}</td>
      ${SECTIONS.map(s=>`<td style="text-align:right;padding:6px;border-bottom:1px solid #ccc">${sectionPct(d,s)}%</td>`).join('')}
      <td style="text-align:right;padding:6px;border-bottom:1px solid #ccc">${STLABEL[dispStatus(d)]}</td></tr>`).join('')}
    </tbody></table>`;
  $('#printArea').innerHTML=body;window.print();
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);}
